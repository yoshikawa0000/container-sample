version: 0.2

env:
  variables:
    AWS_REGION: "ap-northeast-1"
    ECR_REGISTRY: "701699495666.dkr.ecr.ap-northeast-1.amazonaws.com"
    ECR_REPOSITORY: "701699495666.dkr.ecr.ap-northeast-1.amazonaws.com/test-ecr"
    IMAGE_TAG: "latest"
    CONTAINER_NAME: "container-test-app"

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${ECR_REGISTRY}"
      - echo "ECR login completed."

  build:
    commands:
      - echo "Building the Docker image..."
      - docker build -t "${ECR_REPOSITORY}:${IMAGE_TAG}" .
      - echo "Docker image build completed."

  post_build:
    commands:
      - |
        if [ "${CODEBUILD_BUILD_SUCCEEDING}" -ne 1 ]; then
          echo "Build failed. Skipping Docker push."
          exit 1
        fi
      - echo "Pushing the Docker image..."
      - docker push "${ECR_REPOSITORY}:${IMAGE_TAG}"
      - echo "Creating imagedefinitions.json..."
      - printf '[{"name":"%s","imageUri":"%s"}]\n' "${CONTAINER_NAME}" "${ECR_REPOSITORY}:${IMAGE_TAG}" > imagedefinitions.json
      - cat imagedefinitions.json
      - echo "Build completed on $(date)"

artifacts:
  files:
    - imagedefinitions.json
